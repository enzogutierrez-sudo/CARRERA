<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sport Timer - Comunicador</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c10;--surface:#111720;--surface2:#1a2230;--border:#1e2d40;--accent:#00e5ff;--accent2:#ff6b35;--green:#39ff14;--text:#e8f4f8;--muted:#5a7a8a;--danger:#ff3b5c;--yellow:#ffed00}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto}

header{background:#111720;border-bottom:3px solid var(--yellow);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
header img{height:52px;object-fit:contain}
.live{display:flex;align-items:center;gap:8px}
.livedot{width:12px;height:12px;border-radius:50%;background:var(--danger);box-shadow:0 0 10px var(--danger);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.2)}}
.livetxt{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--danger)}

.evbar{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.evname{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--accent);letter-spacing:1px}
.conn{font-size:11px;padding:5px 14px;border-radius:20px;border:1px solid var(--border);color:var(--muted);transition:all .3s}
.conn.ok{color:var(--green);border-color:var(--green)}
.conn.err{color:var(--danger);border-color:var(--danger)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border)}
.stat{padding:14px 20px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.sv{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--accent);line-height:1}
.sl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--border);overflow-x:auto}
.ttab{padding:12px 16px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;flex-shrink:0}
.ttab.active{color:var(--accent);border-bottom-color:var(--accent)}
.ttab.finish-tab.active{color:var(--green);border-bottom-color:var(--green)}
.ttab.cp-tab.active{color:var(--yellow);border-bottom-color:var(--yellow)}
.tcontent{display:none}
.tcontent.active{display:block}

/* TABLA GENERAL — fila por corredor, columna por checkpoint */
.resumen-section{padding:16px 16px 40px;width:100%}
.stitle{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}

.rtable-wrap{overflow-x:auto;width:100%;display:block}
.rtable{width:100%;min-width:480px;border-collapse:collapse;font-size:13px;table-layout:auto}
.rtable thead tr{border-bottom:2px solid var(--border)}
.rtable th{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;color:var(--muted);padding:10px 12px;text-align:left;white-space:nowrap;background:var(--surface2)}
.rtable th.cp-col{color:var(--yellow);text-align:center}
.rtable th.finish-col{color:var(--green);text-align:center}
.rtable tbody tr{border-bottom:0.5px solid var(--border);transition:background .2s}
.rtable tbody tr:hover{background:var(--surface2)}
.rtable tbody tr.new-row{animation:rowpop .6s ease}
@keyframes rowpop{from{background:rgba(57,255,20,.15)}to{background:transparent}}
.rtable td{padding:9px 12px;vertical-align:middle;text-align:left}
.td-pos{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--muted);width:40px;text-align:center}
.td-pos.gold{color:#ffd700}
.td-pos.silver{color:#c0c0c0}
.td-pos.bronze{color:#cd7f32}
.td-dors{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent2);width:60px;text-align:left}
.td-info{text-align:left;min-width:120px}
.td-info .runner-name{font-size:13px;color:var(--accent);line-height:1.3;text-align:left}
.td-info .runner-cat{font-size:10px;color:var(--muted);margin-top:2px;text-align:left}
.td-time{font-family:'Bebas Neue',sans-serif;font-size:17px;text-align:center;white-space:nowrap;min-width:80px}
.td-time.finish{color:var(--green)}
.td-time.cp{color:var(--yellow)}
.td-time.empty{color:var(--border);font-size:13px;text-align:center}
.td-manga{font-size:10px;color:var(--muted);font-style:italic}

/* CARDS LLEGADAS */
.section{padding:16px 20px 4px}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px}
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;transition:all .3s}
.rcard.new{border-color:var(--green);box-shadow:0 0 24px rgba(57,255,20,.2);animation:pop .5s ease}
@keyframes pop{from{transform:scale(1.04);box-shadow:0 0 40px rgba(57,255,20,.5)}to{transform:scale(1)}}
.rc-dors{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--accent2);line-height:1}
.rc-name{font-size:13px;color:var(--accent);margin-top:4px;line-height:1.3}
.rc-team{font-size:11px;color:var(--muted);margin-top:2px}
.rc-time{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text);margin-top:6px}
.rc-cat{font-size:11px;margin-top:4px;padding:3px 8px;border-radius:4px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;display:inline-block}
.rc-cat.M{background:rgba(0,229,255,.1);color:var(--accent);border:1px solid rgba(0,229,255,.25)}
.rc-cat.F{background:rgba(255,107,53,.1);color:var(--accent2);border:1px solid rgba(255,107,53,.25)}

/* CLASIFICACION */
.rlist{display:flex;flex-direction:column;gap:4px}
.rrow{display:grid;grid-template-columns:52px 72px 1fr auto auto;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.rrow.new{border-color:var(--green)}
.rrow.top3{border-color:rgba(0,229,255,.3)}
.rr-pos{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted)}
.rr-pos.gold{color:#ffd700}.rr-pos.silver{color:#c0c0c0}.rr-pos.bronze{color:#cd7f32}
.rr-dors{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--accent2)}
.rr-name{font-size:13px;color:var(--accent);line-height:1.3}
.rr-cat{font-size:10px;margin-top:2px}
.rr-cat.M{color:rgba(0,229,255,.8)}.rr-cat.F{color:rgba(255,107,53,.9)}
.rr-team{font-size:10px;color:var(--muted);margin-top:1px;font-style:italic}
.rr-catpos{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--muted);text-align:center;line-height:1.2;white-space:nowrap}
.rr-catpos span{display:block;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.rr-time{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text);text-align:right;white-space:nowrap}

/* DIST SECTION HEADER */
.dist-header{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;margin:16px 20px 8px;display:flex;align-items:center;justify-content:space-between}
.dist-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);letter-spacing:2px}
.dist-count{font-size:12px;color:var(--muted)}
.rsec{padding:0 20px 20px}

/* TRACK IMAGE */
.track-section{padding:10px 20px 0}
.track-img-container{border-radius:12px;overflow:hidden;border:1px solid var(--border);margin-bottom:12px;display:none}
.track-img-container.visible{display:block}
.track-img-container img{width:100%;display:block;max-height:340px;object-fit:contain;background:#000}
.track-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:6px 10px 0;font-family:'Bebas Neue',sans-serif}

/* SEARCH */
.search-bar{padding:10px 20px 4px;display:flex;gap:8px;align-items:center}
.search-input{flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Mono',monospace;font-size:16px;outline:none}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}
.search-clear{padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:13px;cursor:pointer;white-space:nowrap}
.search-clear:hover{border-color:var(--danger);color:var(--danger)}
.search-result-banner{margin:0 20px 8px;background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.3);border-radius:10px;padding:12px 16px;font-size:12px;color:var(--accent);display:none}
.search-result-banner.visible{display:block}
.rrow.searched{border-color:var(--accent)!important;box-shadow:0 0 14px rgba(0,229,255,.25)!important}

.empty{text-align:center;padding:50px;color:var(--muted);font-size:14px}
</style>
</head>
<body>
<div class="wrap">

<header>
  <img id="logoimg" alt="Sport Timer">
  <div class="live">
    <div class="livedot"></div>
    <div class="livetxt">EN VIVO</div>
  </div>
</header>

<div class="evbar">
  <div class="evname" id="evname">Cargando evento...</div>
  <div class="conn" id="conn">Conectando...</div>
</div>

<div class="stats">
  <div class="stat"><div class="sv" id="st-total">0</div><div class="sl">Finalizaron</div></div>
  <div class="stat"><div class="sv" id="st-dors">-</div><div class="sl">Ultimo dorsal</div></div>
  <div class="stat"><div class="sv" id="st-time">-</div><div class="sl">Ultimo tiempo</div></div>
</div>

<!-- TABS: dinamicos, se generan en JS -->
<div class="tabs" id="tabs-bar">
  <div class="ttab active finish-tab" id="ttab-llegadas" onclick="switchTab('llegadas')">&#127937; LLEGADAS</div>
  <div class="ttab" id="ttab-clasificacion" onclick="switchTab('clasificacion')">&#127941; CLASIFICACION</div>
  <div class="ttab" id="ttab-resumen" onclick="switchTab('resumen')">&#128200; TABLA GENERAL</div>
</div>

<div class="search-bar" id="search-bar" style="display:none">
  <input type="number" class="search-input" id="search-dorsal" placeholder="&#128269; Buscar por dorsal..." min="1" max="9999">
  <button class="search-clear" id="search-clear-btn">LIMPIAR</button>
</div>
<div class="search-result-banner" id="search-banner"></div>

<!-- TAB: LLEGADAS -->
<div class="tcontent active" id="tcontent-llegadas">
  <div class="section">
    <div class="stitle">Ultimos en llegar</div>
    <div class="rgrid" id="rgrid"><div class="empty">Esperando corredores...</div></div>
  </div>
</div>

<!-- TAB: CLASIFICACION -->
<div class="tcontent" id="tcontent-clasificacion">
  <div id="clasificacion-body"><div class="empty">Sin datos aun</div></div>
</div>

<!-- TAB: RESUMEN GENERAL (tabla cruzada corredor x checkpoint) -->
<div class="tcontent" id="tcontent-resumen">
  <div class="track-section">
    <div class="track-img-container" id="track-container">
      <div class="track-label">&#127939; Circuito / Track</div>
      <img id="track-img" src="" alt="Track del circuito">
    </div>
  </div>
  <div class="resumen-section">
    <div class="stitle">&#128200; TABLA GENERAL — TIEMPOS POR CHECKPOINT</div>
    <div class="rtable-wrap" id="resumen-table-wrap">
      <div class="empty">Sin datos aun</div>
    </div>
  </div>
</div>

<!-- TABS DINAMICOS PARA CADA CP (se insertan en JS) -->

</div>

var FIREBASE = "https://sporttimer-482b3-default-rtdb.firebaseio.com";
document.getElementById("logoimg").src = "data:image/png;base64," + LOGO;

var lastCount = 0;
var newKeys = {};
var activeTab = "llegadas";
var currentSearchDorsal = null;
var cpTabsRendered = [];
var lastRaceData = null;

// ── TABS ───────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  // Fixed tabs
  var fixed = ["llegadas","clasificacion","resumen"];
  for (var i = 0; i < fixed.length; i++) {
    var t = fixed[i];
    var tabEl = document.getElementById("ttab-" + t);
    var contentEl = document.getElementById("tcontent-" + t);
    if (tabEl) tabEl.classList.toggle("active", t === tab);
    if (contentEl) contentEl.classList.toggle("active", t === tab);
  }
  // CP tabs
  for (var j = 0; j < cpTabsRendered.length; j++) {
    var cpId = cpTabsRendered[j];
    var ctab = document.getElementById("ttab-cp-" + cpId);
    var ccontent = document.getElementById("tcontent-cp-" + cpId);
    if (ctab) ctab.classList.toggle("active", "cp-" + cpId === tab);
    if (ccontent) ccontent.classList.toggle("active", "cp-" + cpId === tab);
  }
  var searchBar = document.getElementById("search-bar");
  searchBar.style.display = (tab === "clasificacion") ? "flex" : "none";
  if (tab !== "clasificacion") {
    document.getElementById("search-dorsal").value = "";
    document.getElementById("search-banner").classList.remove("visible");
    currentSearchDorsal = null;
  }
}
window.switchTab = switchTab;

// ── CONNECTION ─────────────────────────────────────────
function setConn(msg, cls) {
  var el = document.getElementById("conn");
  el.textContent = msg;
  el.className = "conn " + (cls || "");
}

function sexClass(sex) { return (sex || "").toUpperCase() === "F" ? "F" : "M"; }

// ── BUILD CP TABS ──────────────────────────────────────
function buildCpTabs(cpDefs) {
  var tabsBar = document.getElementById("tabs-bar");
  // Remove old CP tabs
  for (var i = 0; i < cpTabsRendered.length; i++) {
    var oldTab = document.getElementById("ttab-cp-" + cpTabsRendered[i]);
    var oldContent = document.getElementById("tcontent-cp-" + cpTabsRendered[i]);
    if (oldTab) oldTab.remove();
    if (oldContent) oldContent.remove();
  }
  cpTabsRendered = [];
  if (!cpDefs || !cpDefs.length) return;
  for (var j = 0; j < cpDefs.length; j++) {
    var cp = cpDefs[j];
    cpTabsRendered.push(cp.id);
    // Tab button
    var tabBtn = document.createElement("div");
    tabBtn.id = "ttab-cp-" + cp.id;
    tabBtn.className = "ttab cp-tab";
    tabBtn.innerHTML = "&#128681; " + cp.name;
    tabBtn.setAttribute("onclick", "switchTab('cp-" + cp.id + "')");
    tabsBar.appendChild(tabBtn);
    // Content div
    var contentDiv = document.createElement("div");
    contentDiv.id = "tcontent-cp-" + cp.id;
    contentDiv.className = "tcontent";
    contentDiv.innerHTML = '<div class="resumen-section"><div class="stitle">&#128681; ' + cp.name + (cp.km ? ' — ' + cp.km + ' km' : '') + '</div><div id="cp-content-' + cp.id + '"><div class="empty">Sin datos aun</div></div></div>';
    document.querySelector(".wrap").appendChild(contentDiv);
  }
}

// ── FETCH ──────────────────────────────────────────────
function fetchData() {
  fetch(FIREBASE + "/track.json")
    .then(function(r){ return r.json(); })
    .then(function(t){
      if (t && t.img) {
        var container = document.getElementById("track-container");
        var img = document.getElementById("track-img");
        if (img.src !== t.img) img.src = t.img;
        container.classList.add("visible");
      } else { document.getElementById("track-container").classList.remove("visible"); }
    }).catch(function(){});

  fetch(FIREBASE + "/races.json")
    .then(function(r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .then(function(allRaces) {
      if (!allRaces) { setConn("Conectado \u2014 sin datos","ok"); renderEmpty(); return; }
      var bestRace = null, bestTime = 0;
      var keys = Object.keys(allRaces);
      for (var k = 0; k < keys.length; k++) {
        var race = allRaces[keys[k]];
        if (race && race.updated && race.updated > bestTime) { bestTime = race.updated; bestRace = race; }
      }
      if (!bestRace) { setConn("Conectado \u2014 sin datos","ok"); renderEmpty(); return; }
      setConn("\u25CF EN LINEA","ok");
      document.getElementById("evname").textContent = bestRace.name || "Evento activo";
      lastRaceData = bestRace;

      var entries    = bestRace.entries    || [];
      var checkpoints = bestRace.checkpoints || {};
      var cpDefs     = bestRace.checkpointDefs || [];

      // Build CP tabs if needed
      var needRebuild = cpDefs.length !== cpTabsRendered.length;
      if (!needRebuild) {
        for (var ci = 0; ci < cpDefs.length; ci++) {
          if (cpDefs[ci].id !== cpTabsRendered[ci]) { needRebuild = true; break; }
        }
      }
      if (needRebuild) buildCpTabs(cpDefs);

      // Detect new finishers
      if (entries.length > lastCount) {
        for (var i = lastCount; i < entries.length; i++) {
          newKeys[entries[i].dorsal + "_" + entries[i].tiempo] = true;
        }
        setTimeout(function() { newKeys = {}; }, 4000);
      }
      lastCount = entries.length;

      if (!entries.length) { renderEmpty(); }
      else { renderStats(entries); renderCards(entries); renderClasificacion(entries); }

      renderResumen(entries, checkpoints, cpDefs);
      renderCpTabs(checkpoints, cpDefs);
    })
    .catch(function(err) { setConn("Sin conexion","err"); console.error(err); });
}

function renderEmpty() {
  document.getElementById("st-total").textContent = "0";
  document.getElementById("st-dors").textContent = "-";
  document.getElementById("st-time").textContent = "-";
  document.getElementById("rgrid").innerHTML = '<div class="empty">Esperando corredores...</div>';
  document.getElementById("clasificacion-body").innerHTML = '<div class="empty">Sin datos aun</div>';
}

// ── STATS ──────────────────────────────────────────────
function renderStats(entries) {
  document.getElementById("st-total").textContent = entries.length;
  var last = entries[entries.length-1];
  document.getElementById("st-dors").textContent = "#" + last.dorsal;
  document.getElementById("st-time").textContent = last.tiempo;
}

// ── CARDS ──────────────────────────────────────────────
function renderCards(entries) {
  var grid = document.getElementById("rgrid");
  var recent = entries.slice().reverse().slice(0,12);
  var html = "";
  for (var i = 0; i < recent.length; i++) {
    var e = recent[i];
    var k = e.dorsal + "_" + e.tiempo;
    var sc = sexClass(e.sex);
    html += '<div class="rcard' + (newKeys[k] ? " new" : "") + '">'
      + '<div class="rc-dors">#' + e.dorsal + '</div>'
      + (e.name ? '<div class="rc-name">' + e.name + '</div>' : '')
      + (e.team ? '<div class="rc-team">' + e.team + '</div>' : '')
      + '<div class="rc-time">' + e.tiempo + '</div>'
      + (e.dist ? '<div class="rc-cat ' + sc + '">' + e.dist + '</div>' : '')
      + '</div>';
  }
  grid.innerHTML = html || '<div class="empty">Esperando corredores...</div>';
}

// ── CLASIFICACION ──────────────────────────────────────
function renderClasificacion(entries) {
  var sorted = entries.slice().sort(function(a,b){ return (a.ms||0)-(b.ms||0); });
  var catGroups={}, catOrder=[];
  for (var i=0;i<sorted.length;i++) {
    var e=sorted[i];
    var ckey=(e.dist||"General")+(e.cat?" \u00B7 "+e.cat:"");
    if (!catGroups[ckey]) { catGroups[ckey]=[]; catOrder.push(ckey); }
    catGroups[ckey].push(e);
  }
  for (var ck in catGroups) {
    catGroups[ck].sort(function(a,b){ return (a.ms||0)-(b.ms||0); });
    for (var j=0;j<catGroups[ck].length;j++) catGroups[ck][j].catGrpPos=j+1;
  }
  catOrder.sort(function(a,b){ return a.localeCompare(b,"es",{sensitivity:"base"}); });
  var html2="";
  for (var ci=0;ci<catOrder.length;ci++) {
    var ck2=catOrder[ci]; var cgrp=catGroups[ck2];
    html2+='<div class="dist-header"><div class="dist-title" style="font-size:15px">'+ck2+'</div><div class="dist-count">'+cgrp.length+' corredor'+(cgrp.length!==1?'es':'')+'</div></div>';
    html2+='<div class="rsec"><div class="rlist">';
    for (var ri=0;ri<cgrp.length;ri++) {
      var e2=cgrp[ri]; var k2=e2.dorsal+"_"+e2.tiempo;
      var pos=e2.catGrpPos;
      var rowCls="rrow"+(newKeys[k2]?" new":"")+(pos<=3?" top3":"");
      var sc=sexClass(e2.sex);
      var posClass=pos===1?" gold":pos===2?" silver":pos===3?" bronze":"";
      html2+='<div class="'+rowCls+'" data-dorsal="'+e2.dorsal+'">'
        +'<div class="rr-pos'+posClass+'">'+pos+'\u00BA</div>'
        +'<div class="rr-dors">#'+e2.dorsal+'</div>'
        +'<div><div class="rr-name">'+(e2.name||'\u2014')+'</div>'
        +(e2.dist?'<div class="rr-cat '+sc+'">'+e2.dist+'</div>':'')
        +(e2.team?'<div class="rr-team">'+e2.team+'</div>':'')
        +'</div>'
        +'<div class="rr-catpos">'+pos+'\u00BA<span>en cat.</span></div>'
        +'<div class="rr-time">'+e2.tiempo+'</div>'
        +'</div>';
    }
    html2+='</div></div>';
  }
  document.getElementById("clasificacion-body").innerHTML = html2;
  if (currentSearchDorsal) applySearch();
}

// ── TABLA RESUMEN CRUZADA ─────────────────────────────
function normalizeArray(val) {
  // Firebase can return arrays as objects with numeric string keys
  // This converts either format to a plain array
  if (!val) return [];
  if (Array.isArray(val)) return val;
  if (typeof val === "object") {
    // Convert {0:{...}, 1:{...}} to [{...},{...}]
    var keys = Object.keys(val).sort(function(a,b){ return parseInt(a,10)-parseInt(b,10); });
    return keys.map(function(k){ return val[k]; }).filter(Boolean);
  }
  return [];
}

function renderResumen(entries, checkpoints, cpDefs) {
  var wrap = document.getElementById("resumen-table-wrap");

  // Normalize entries
  entries = normalizeArray(entries);
  cpDefs  = normalizeArray(cpDefs);

  if (!entries.length && !cpDefs.length) {
    wrap.innerHTML = '<div class="empty">Sin datos aun — esperando registros...</div>';
    return;
  }

  // Build finish index: dorsal (string) -> entry
  var finishByDorsal = {};
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    finishByDorsal[String(e.dorsal)] = e;
  }

  // Build CP index: cpId -> { dorsal(string) -> best entry }
  var cpByDorsal = {};
  for (var ci = 0; ci < cpDefs.length; ci++) {
    var cpId = cpDefs[ci].id;
    cpByDorsal[cpId] = {};
    var rawArr = (checkpoints && checkpoints[cpId]) ? checkpoints[cpId] : [];
    var arr = normalizeArray(rawArr);
    for (var j = 0; j < arr.length; j++) {
      var cpEntry = arr[j];
      if (!cpEntry || cpEntry.dorsal === undefined) continue;
      var dKey = String(cpEntry.dorsal);
      var existingMs = cpByDorsal[cpId][dKey] ? cpByDorsal[cpId][dKey].ms : Infinity;
      if ((cpEntry.ms || 0) < existingMs) {
        cpByDorsal[cpId][dKey] = cpEntry;
      }
    }
  }

  // Collect all known dorsals across all sources
  var allDorsals = {};
  for (var fd in finishByDorsal) allDorsals[fd] = true;
  for (var ci2 = 0; ci2 < cpDefs.length; ci2++) {
    var cpId2 = cpDefs[ci2].id;
    for (var cd in cpByDorsal[cpId2]) allDorsals[cd] = true;
  }

  var dorsalList = Object.keys(allDorsals);
  if (!dorsalList.length) {
    wrap.innerHTML = '<div class="empty">Sin datos aun</div>';
    return;
  }

  // Sort: finished runners first (by finish ms), then CP-only runners (by first CP ms), then by dorsal number
  dorsalList.sort(function(a, b) {
    var fa = finishByDorsal[a] ? (finishByDorsal[a].ms || 0) : Infinity;
    var fb = finishByDorsal[b] ? (finishByDorsal[b].ms || 0) : Infinity;
    if (fa !== fb) return fa - fb;
    // Fallback: first CP
    for (var ci3 = 0; ci3 < cpDefs.length; ci3++) {
      var cid3 = cpDefs[ci3].id;
      var ca = cpByDorsal[cid3][a] ? (cpByDorsal[cid3][a].ms || 0) : Infinity;
      var cb3 = cpByDorsal[cid3][b] ? (cpByDorsal[cid3][b].ms || 0) : Infinity;
      if (ca !== cb3) return ca - cb3;
    }
    return parseInt(a, 10) - parseInt(b, 10);
  });

  // Table header
  var html = '<table class="rtable"><thead><tr>'
    + '<th>POS</th><th>CORREDOR</th><th>#</th>';
  for (var hi = 0; hi < cpDefs.length; hi++) {
    var cp = cpDefs[hi];
    html += '<th class="cp-col">' + (cp.name || "CP").toUpperCase()
      + (cp.km ? '<br><span style="font-size:9px;font-weight:400">' + cp.km + ' km</span>' : '')
      + '</th>';
  }
  html += '<th class="finish-col">FINISH</th></tr></thead><tbody>';

  // Rows
  for (var ri = 0; ri < dorsalList.length; ri++) {
    var dors = dorsalList[ri];
    var fe = finishByDorsal[dors];
    var pos = ri + 1;
    var posClass = pos === 1 ? " gold" : pos === 2 ? " silver" : pos === 3 ? " bronze" : "";
    var isNew = fe && newKeys[dors + "_" + fe.tiempo];

    // Collect runner info from any available source
    var info = fe;
    if (!info) {
      for (var ici = 0; ici < cpDefs.length; ici++) {
        var candidate = cpByDorsal[cpDefs[ici].id][dors];
        if (candidate) { info = candidate; break; }
      }
    }
    info = info || {};

    html += '<tr' + (isNew ? ' class="new-row"' : '') + '>';
    html += '<td class="td-pos' + posClass + '">' + pos + 'º</td>';
    html += '<td class="td-info">'
      + '<div class="runner-name">' + (info.name || '#' + dors) + '</div>'
      + (info.cat  ? '<div class="runner-cat">'  + info.cat  + '</div>' : '')
      + (info.dist ? '<div class="runner-cat">'  + info.dist + '</div>' : '')
      + (info.manga ? '<div class="td-manga">'   + info.manga + '</div>' : '')
      + '</td>';
    html += '<td class="td-dors">#' + dors + '</td>';

    for (var ci4 = 0; ci4 < cpDefs.length; ci4++) {
      var cpId4 = cpDefs[ci4].id;
      var cpE = cpByDorsal[cpId4] ? cpByDorsal[cpId4][dors] : null;
      html += cpE
        ? '<td class="td-time cp">' + cpE.tiempo + '</td>'
        : '<td class="td-time empty">—</td>';
    }

    html += fe
      ? '<td class="td-time finish">' + fe.tiempo + '</td>'
      : '<td class="td-time empty" style="color:var(--muted);font-size:12px">en curso</td>';

    html += '</tr>';
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

// ── CP INDIVIDUAL TABS ─────────────────────────────────
function renderCpTabs(checkpoints, cpDefs) {
  for (var ci = 0; ci < cpDefs.length; ci++) {
    var cp = cpDefs[ci];
    var container = document.getElementById("cp-content-" + cp.id);
    if (!container) continue;
    var rawArr = (checkpoints && checkpoints[cp.id]) ? checkpoints[cp.id] : [];
    var arr = normalizeArray(rawArr);
    if (!arr.length) { container.innerHTML = '<div class="empty">Sin registros en este CP aun.</div>'; continue; }
    // Sort by ms asc
    var sorted = arr.slice().sort(function(a,b){ return (a.ms||0)-(b.ms||0); });
    var html = '<div class="rlist">';
    for (var i = 0; i < sorted.length; i++) {
      var e = sorted[i];
      var pos = i+1;
      var posClass = pos===1?" gold":pos===2?" silver":pos===3?" bronze":"";
      html += '<div class="rrow' + (pos<=3?" top3":"") + '">'
        + '<div class="rr-pos' + posClass + '">' + pos + '\u00BA</div>'
        + '<div class="rr-dors">#' + e.dorsal + '</div>'
        + '<div><div class="rr-name">' + (e.name||'\u2014') + '</div>'
        + (e.cat?'<div class="rr-cat">' + e.cat + '</div>':'')
        + '</div>'
        + '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:20px;color:var(--yellow);text-align:right">' + e.tiempo + '</div>'
        + '</div>';
    }
    html += '</div>';
    container.innerHTML = html;
    // Update tab badge
    var tabEl = document.getElementById("ttab-cp-" + cp.id);
    if (tabEl) tabEl.innerHTML = "&#128681; " + cp.name + " (" + sorted.length + ")";
  }
}

// ── SEARCH ─────────────────────────────────────────────
document.getElementById("search-dorsal").addEventListener("input", function() {
  var val = this.value.trim();
  currentSearchDorsal = val ? parseInt(val,10) : null;
  applySearch();
});
document.getElementById("search-clear-btn").addEventListener("click", function() {
  document.getElementById("search-dorsal").value = "";
  currentSearchDorsal = null;
  applySearch();
});
function applySearch() {
  var banner = document.getElementById("search-banner");
  var rows = document.querySelectorAll("#clasificacion-body [data-dorsal]");
  if (!currentSearchDorsal) {
    banner.classList.remove("visible");
    for (var i=0;i<rows.length;i++) rows[i].classList.remove("searched");
    return;
  }
  var found = null;
  for (var j=0;j<rows.length;j++) {
    var match = parseInt(rows[j].getAttribute("data-dorsal"),10) === currentSearchDorsal;
    rows[j].classList.toggle("searched", match);
    if (match) found = rows[j];
  }
  if (found) {
    banner.classList.add("visible");
    banner.innerHTML = "Dorsal #" + currentSearchDorsal + " encontrado";
    found.scrollIntoView({behavior:"smooth", block:"center"});
  } else {
    banner.classList.add("visible");
    banner.innerHTML = "Dorsal #" + currentSearchDorsal + " \u2014 no encontrado aun";
  }
}

fetchData();
setInterval(fetchData, 2000);

})();
</script>
